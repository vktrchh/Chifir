# docker-compose-monitoring.yml - Мониторинг
# РАСПОЛОЖЕНИЕ: ~/load-tests/monitoring/docker-compose-monitoring.yml
# ЗАПУСК: docker-compose -f docker-compose-monitoring.yml up -d

version: '3.8'

services:
  # Prometheus для сбора метрик
  prometheus:
    image: prom/prometheus:latest
    container_name: load-test-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring-network

  # Grafana для визуализации
  grafana:
    image: grafana/grafana:latest
    container_name: load-test-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring-network
    depends_on:
      - prometheus

  # Node Exporter для метрик системы
  node-exporter:
    image: prom/node-exporter:latest
    container_name: load-test-node-exporter
    ports:
      - "9100:9100"
    networks:
      - monitoring-network

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring-network:
    driver: bridge
